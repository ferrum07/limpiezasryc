<!DOCTYPE html>

    <link rel="icon" href="../logo/logo_compacto.png" type="image/png">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    
    <header class="cabecera-fija">
        <div class="logo-container">
            <a href="../index.html">

        </div>
        <button class="menu-toggle" aria-label="Abrir menú" aria-expanded="false">

            <a href="../servicios/servicios.html">Servicios</a>
            <a href="contacto.html" class="active">Contacto y Localización</a>

    <main class="contenido">
        
        <section class="blur-banner">
            <h2 class="banner-titulo">Estamos aquí para ayudarte</h2>
            <p>
                Ponte en contacto con nosotros para un presupuesto sin compromiso o cualquier consulta.
            </p>
        </section>
                    <h2 class="elige-titulo" style="margin-bottom: 30px; text-align: center;">Contacta Directamente</h2>
                    
                    <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; max-width: 450px; margin: 0 auto;">
                        
                        <a href="https://maps.app.goo.gl/tML3Pcb5n7wf8umD9" target="_blank" class="btn-big" style="flex-grow: 1; flex-basis: calc(50% - 15px); padding: 16px 10px; font-size: 1.05em; margin: 0;">
                            <i class="fa fa-map-marker-alt"></i> Palma, 07009
                        </a>
                        <a href="tel:+34671263683" class="btn-big" style="flex-grow: 1; flex-basis: calc(50% - 15px); padding: 16px 10px; font-size: 1.05em; margin: 0;">
                            <i class="fa fa-phone"></i> Llamar
                        </a>
                        
                        <a href="https://wa.me/34671263683" target="_blank" class="btn-big" style="flex-grow: 1; flex-basis: calc(50% - 15px); padding: 16px 10px; font-size: 1.05em; margin: 15px 0 0 0;">
                            <i class="fab fa-whatsapp"></i> WhatsApp
                        </a>
                        <a href="mailto:contacto@limpiezasryc.com" class="btn-big" style="flex-grow: 1; flex-basis: calc(50% - 15px); padding: 16px 10px; font-size: 1.05em; margin: 15px 0 0 0;">
                            <i class="fa fa-envelope"></i> Email
                        </a>
                    </div>
                </div>
            </div>
        <section class="contacto-wrapper" style="max-width: 1000px; margin: 40px auto; padding: 0 15px;">
            
            <div class="contact-grid">
                
                <div class="contact-mapa">
                    <h2 class="elige-titulo" style="text-align: center;">Nuestra Ubicación</h2>
                    <div class="map-container" style="border-radius: 12px; overflow: hidden; box-shadow: var(--sombra); margin-top: 20px;">
                        <iframe 
                            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3056.9150035515795!2d2.651786!3d39.575916!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x129759d4791e847b%3A0x633917d712411985!2sPalma%20de%20Mallorca%2C%20Balearic%20Islands!5e0!3m2!1sen!2ses!4v1700236528751!5m2!1sen!2ses"

                            height="450" 
                            style="border:0;" 
                            allowfullscreen="" 
                            loading="lazy" 
                            referrerpolicy="no-referrer-when-downgrade">
                        </iframe>
                    </div>
                </div>



        </section>

    <footer>
        <span>2025 © LIMPIEZAS R&C</span>
    </footer>
    
    <script>
      document.querySelector('.menu-toggle').addEventListener('click', function() {
        const menu = document.getElementById('menu-principal');
        const isExpanded = this.getAttribute('aria-expanded') === 'true' || false;
        this.setAttribute('aria-expanded', !isExpanded);
        menu.classList.toggle('is-open');
      });
    </script>
</body>
</html>
